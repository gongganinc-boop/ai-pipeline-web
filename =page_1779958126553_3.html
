<html>
<head>
  <meta charset="UTF-8">
  <title>AI 기반 스마트 홈 제어 앱</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', '맑은 고딕', Arial, sans-serif;
      background: #f6f8fc;
      color: #222;
    }

    header {
      background: linear-gradient(90deg, #4e8af4 40%, #34b6e7 100%);
      color: #fff;
      padding: 1.5rem 1rem 1rem 1.5rem;
      text-align: left;
    }

    header h1 {
      font-size: 2rem;
      margin: 0 0 0.3em 0;
      font-weight: 700;
      letter-spacing: -1px;
    }

    header p {
      font-size: 1rem;
      color: #e3f0ff;
      margin: 0;
    }

    main {
      max-width: 840px;
      margin: 2.5em auto;
      background: #fff;
      border-radius: 1.5em;
      box-shadow: 0 8px 32px rgba(50,90,180,0.07);
      padding: 2em 1.5em 2em 1.5em;
    }

    .section {
      margin-bottom: 2.7em;
    }

    .section:last-child {
      margin-bottom: 0;
    }

    h2 {
      color: #337fd6;
      margin-bottom: 1em;
      font-size: 1.2em;
      font-weight: 700;
      letter-spacing: -0.8px;
    }

    /* 음성인식 영역 */
    #voice-control {
      text-align: center;
    }
    #mic-btn {
      background: #4e8af4;
      border: none;
      color: #fff;
      font-size: 1.2em;
      border-radius: 2em;
      padding: 0.7em 2em;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 0.7em;
      box-shadow: 0 3px 12px 0 rgba(49,140,240,0.13);
    }
    #mic-btn.listening {
      background: #198cfa;
      animation: pulse 0.8s infinite alternate;
    }
    @keyframes pulse {
      from { box-shadow: 0 0 0 0 #63bcff44; }
      to { box-shadow: 0 0 10px 7px #63bcff44; }
    }
    #voice-command-display {
      margin: 1.3em 0 0.5em 0;
      min-height: 1.5em;
      font-size: 1.08em;
      color: #21245f;
    }
    #voice-status {
      font-size: 0.95em;
      color: #7b879f;
      margin-top: 0.4em;
    }

    /* 기기 컨트롤 */
    #device-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
      gap: 1.4em;
      margin-top: 1.1em;
    }
    .device {
      background: #f5f9ff;
      border-radius: 1em;
      padding: 1.1em 1.2em 1em 1.2em;
      text-align: left;
      box-shadow: 0 3px 12px 0 rgba(49,140,240,0.07);
    }
    .device-title {
      font-weight: 600;
      margin-bottom: 0.4em;
      color: #4d71c6;
    }
    .toggle-btn {
      display: inline-block;
      position: relative;
      width: 46px;
      height: 26px;
    }
    .toggle-btn input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #ddd;
      border-radius: 26px;
      transition: .3s;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 20px;
      width: 20px;
      left: 3px;
      bottom: 3px;
      background-color: #fff;
      border-radius: 50%;
      transition: .3s;
      box-shadow: 0 1px 4px #9993;
    }
    .toggle-btn input:checked + .slider {
      background-color: #4e8af4;
    }
    .toggle-btn input:checked + .slider:before {
      transform: translateX(20px);
    }
    .device-status {
      display: inline-block;
      margin-left: .7em;
      font-size: 0.92em;
      color: #506098;
      min-width: 58px;
    }
    .schedule-info {
      text-align: left;
      font-size: 0.98em;
      margin: 1em 0 0 0;
      color: #5387b7;
    }
    /* 에너지 절약 영역 */
    #energy {
      margin-top: 1em;
      text-align: center;
    }
    #energy-bar {
      width: 76%;
      height: 1.7em;
      margin: 1.2em auto;
      border-radius: 20px;
      background-color: #f1f4fa;
      overflow: hidden;
    }
    #energy-usage {
      height: 100%;
      background: linear-gradient(90deg, #6fc6c8 0%, #4e8af4 100%);
      border-radius: 20px;
      transition: width 0.5s;
      position: relative;
    }
    #energy-value {
      color: #364652;
      font-size: 1.25em;
      font-weight: 600;
    }
    #energy-suggestion {
      margin-top: 0.7em;
      color: #3b687d;
      font-size:1.04em;
    }

    /* 자동 스케줄러 */
    #scheduler-form {
      text-align: left;
      padding: 1.1em 1.5em 1.2em 1.5em;
      border-radius: 1em;
      background: #f7fafc;
      margin-bottom: 1em;
      box-shadow: 0 1px 4px #a8bdd93a;
    }
    #scheduler-form label {
      font-size: 1em;
      font-weight: 500;
      margin-right: 1em;
      color: #274b77;
    }
    #scheduler-form select, #scheduler-form input[type="time"] {
      font-size:1em;
      padding: 0.25em 0.7em;
      border-radius: 6px;
      border: 1px solid #bedcf5;
      margin-right: 1.3em;
      margin-bottom:0.3em;
    }
    #scheduler-form button {
      background: #4e8af4;
      color: #fff;
      border: none;
      padding: .45em 1.2em;
      font-size: 1em;
      border-radius: 1.5em;
      cursor: pointer;
      transition: background 0.2s;
    }
    #scheduler-form button:active, #mic-btn:active {
      background: #2e5296;
    }

    ul#schedule-list {
      margin: 0.5em 0 0.5em 1.5em;
      padding: 0;
      color: #3b687d;
      font-size: 0.99em;
    }
    ul#schedule-list li {
      line-height: 1.55em;
      padding-left: 0;
    }
    .remove-schedule {
      color: #f23e60;
      background:none;
      border:none;
      font-size: 1em;
      margin-left:0.7em;
      cursor:pointer;
      vertical-align:middle;
    }

    @media (max-width: 620px) {
      main { padding: 1em 0.3em; }
      header { padding:.8em 0.6em;}
    }
  </style>
</head>
<body>
  <header>
    <h1>AI 기반 스마트 홈 제어</h1>
    <p>음성 제어, 자동 스케줄링, 에너지 절약으로 더 똑똑하고 편리한 집을 만들어 보세요.<br>
      <small>30~40대 맞벌이 부부를 위한 스마트 홈</small>
    </p>
  </header>
  <main>
    <!-- 음성 인식 제어 -->
    <section class="section" id="voice-control">
      <h2>음성 인식 제어</h2>
      <div>
        <button id="mic-btn" type="button">
          🎤 음성 명령 시작
        </button>
        <div id="voice-command-display"></div>
        <div id="voice-status">"불 꺼줘", "에어컨 켜", "스케줄 추가" 등 자연어로 명령하세요.</div>
      </div>
    </section>

    <!-- 기기 제어 -->
    <section class="section">
      <h2>스마트 기기 제어</h2>
      <div id="device-list">
        <div class="device" data-device="light">
          <div class="device-title">거실 불</div>
          <label class="toggle-btn">
            <input type="checkbox" id="light-switch">
            <span class="slider"></span>
          </label>
          <span class="device-status" id="light-status">OFF</span>
          <div class="schedule-info" id="light-schedule"></div>
        </div>
        <div class="device" data-device="aircon">
          <div class="device-title">에어컨</div>
          <label class="toggle-btn">
            <input type="checkbox" id="aircon-switch">
            <span class="slider"></span>
          </label>
          <span class="device-status" id="aircon-status">OFF</span>
          <div class="schedule-info" id="aircon-schedule"></div>
        </div>
        <div class="device" data-device="boiler">
          <div class="device-title">보일러</div>
          <label class="toggle-btn">
            <input type="checkbox" id="boiler-switch">
            <span class="slider"></span>
          </label>
          <span class="device-status" id="boiler-status">OFF</span>
          <div class="schedule-info" id="boiler-schedule"></div>
        </div>
      </div>
    </section>

    <!-- 자동 스케줄러 -->
    <section class="section">
      <h2>자동 스케줄링 (AI 추천 기능 포함)</h2>
      <form id="scheduler-form" action="#">
        <label for="device-select">기기</label>
        <select id="device-select">
          <option value="light">거실 불</option>
          <option value="aircon">에어컨</option>
          <option value="boiler">보일러</option>
        </select>
        <label for="action-select">동작</label>
        <select id="action-select">
          <option value="on">켜기</option>
          <option value="off">끄기</option>
        </select>
        <label for="time-input">시간</label>
        <input type="time" id="time-input" required>
        <button type="submit">스케줄 추가</button>
      </form>

      <ul id="schedule-list"></ul>
    </section>

    <!-- 에너지 절약 -->
    <section class="section" id="energy">
      <h2>에너지 절약 현황</h2>
      <div id="energy-bar">
        <div id="energy-usage" style="width: 56%"></div>
      </div>
      <div id="energy-value">월간 예상 사용량: <span id="energy-kwh">312</span> kWh</div>
      <div id="energy-suggestion"></div>
    </section>
  </main>

  <script>
    // 상태 데이터
    const devices = {
      light: { name: "거실 불", status: false, schedules: [] },
      aircon: { name: "에어컨", status: false, schedules: [] },
      boiler: { name: "보일러", status: false, schedules: [] }
    };

    // 실제 에너지 소비(kWh): 단순화된 예시
    const energyRates = { light: 2, aircon: 16, boiler: 8 };
    function calcEnergyUsage() {
      // 스케줄에 따라 예측 사용량 산출 (단순화: "켜있음 x 8시간/일"로 가정)
      let total = 0;
      for (let key in devices) {
        total += (devices[key].status ? energyRates[key]*30*8/24 : 0)
          + (devices[key].schedules.length * energyRates[key]*10/30); // 스케줄에 따라 소폭 증가
      }
      return Math.round(Math.max(total, 120) + Math.random()*37); // 플로어, 랜덤성 부여
    }

    function refreshEnergyBar() {
      const usage = calcEnergyUsage();
      const percent = Math.min(100, Math.round((usage/450)*100));
      document.getElementById('energy-usage').style.width = percent + '%';
      document.getElementById('energy-kwh').textContent = usage;
      let suggestion = "";
      if (usage < 200) suggestion = "매우 우수해요! 가족 모두 에너지 절약에 신경 쓰고 있어요.";
      else if (usage < 320) suggestion = "적정 수준이에요. 에어컨, 보일러 스케줄을 한 번 더 확인해보세요.";
      else suggestion = "에너지 사용이 높아요. '에어컨' 사용을 줄이거나, 자동 스케줄링을 더 활용해봐요!";
      document.getElementById('energy-suggestion').textContent = suggestion;
    }

    // 기기 스위치 클릭/체크 이벤트
    function updateDeviceSwitch(device, isOn) {
      devices[device].status = isOn;
      document.getElementById(device+"-switch").checked = isOn;
      document.getElementById(device+"-status").textContent = isOn ? "ON" : "OFF";
      refreshEnergyBar();
      showSchedules(); // schedule-info 업데이트
    }
    ["light","aircon","boiler"].forEach(dev => {
      document.getElementById(dev+'-switch').addEventListener('change', function() {
        updateDeviceSwitch(dev, this.checked);
      });
    });

    // 스케줄 출력
    function showSchedules() {
      ["light","aircon","boiler"].forEach(dev => {
        let txt = "";
        if (devices[dev].schedules.length > 0)
          txt = "⏰ 예약: " + devices[dev].schedules.map(s=>`${s.time}에 ${s.action==='on'?'켜짐':'꺼짐'}`).join(", ");
        document.getElementById(`${dev}-schedule`).textContent = txt;
      });

      // 아래 스케줄 목록
      const ul = document.getElementById('schedule-list');
      ul.innerHTML = '';
      let no = 0;
      for (let dev in devices) {
        devices[dev].schedules.forEach((s, idx) => {
          const li = document.createElement('li');
          li.textContent = `[${devices[dev].name}] ${s.time}에 ${s.action === 'on' ? '켜기' : '끄기'}`;
          const rmBtn = document.createElement('button');
          rmBtn.type = "button";
          rmBtn.className = 'remove-schedule';
          rmBtn.innerHTML = "🗑";
          rmBtn.title = "삭제";
          rmBtn.onclick = () => {
            devices[dev].schedules.splice(idx,1);
            showSchedules();
            refreshEnergyBar();
          };
          li.appendChild(rmBtn);
          ul.appendChild(li);
          no++;
        });
      }
      if(no===0) {
        ul.innerHTML = '<li style="color:#aaa;">등록된 스케줄이 없습니다.</li>';
      }
    }
    showSchedules();

    // 자동 스케줄러 폼 처리
    document.getElementById('scheduler-form').addEventListener('submit', function(e){
      e.preventDefault();
      const device = document.getElementById('device-select').value;
      const action = document.getElementById('action-select').value;
      const time = document.getElementById('time-input').value;
      if(!time) return;
      devices[device].schedules.push({ action, time });
      showSchedules();
      refreshEnergyBar();
      document.getElementById('time-input').value = '';
      alert("스케줄이 추가되었습니다.");
    });

    // 스케줄 자동 실행 (1초마다 확인)
    setInterval(()=>{
      const now = new Date();
      const hhmm = now.toTimeString().slice(0,5);
      for(let dev in devices) {
        devices[dev].schedules.forEach(sch=>{
          if (sch.time === hhmm) {
            const val = sch.action === 'on';
            updateDeviceSwitch(dev, val);
            // 알림
            if(document.hidden===false) {
              const msg = `스케줄 실행: [${devices[dev].name}] ${sch.action==='on'?'켜짐':'꺼짐'}`;
              showToast(msg);
            }
          }
        });
      }
    }, 1000);

    // 간단 Toast 알림
    function showToast(msg) {
      let toast = document.getElementById('ai-toast');
      if (!toast) {
        toast = document.createElement('div');
        toast.id = 'ai-toast';
        toast.style.position = 'fixed';
        toast.style.bottom = '36px';
        toast.style.left = '50%';
        toast.style.transform = 'translateX(-50%)';
        toast.style.background = '#4e8af4';
        toast.style.color = '#fff';
        toast.style.padding = '0.7em 1.7em';
        toast.style.borderRadius = '1.8em';
        toast.style.fontSize = '1.13em';
        toast.style.boxShadow = '0 4px 18px #2b7fdb22';
        toast.style.opacity = '0';
        toast.style.transition = 'opacity 0.3s';
        document.body.appendChild(toast);
      }
      toast.textContent = msg;
      toast.style.opacity = '1';
      setTimeout(()=>{toast.style.opacity='0';}, 2600);
    }

    // --- 음성 인식 기능 ---
    let recognition, recognizing = false;
    const voiceBtn = document.getElementById('mic-btn');
    const voiceResult = document.getElementById('voice-command-display');
    // Web Speech API 대응
    if (window.SpeechRecognition || window.webkitSpeechRecognition) {
      recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
      recognition.lang = "ko-KR";
      recognition.continuous = false;
      recognition.interimResults = false;

      recognition.onstart = ()=>{
        recognizing = true;
        voiceBtn.textContent = "🎤 인식 중... 멈추려면 클릭";
        voiceBtn.classList.add('listening');
        voiceResult.textContent = '';
      };
      recognition.onend = ()=>{
        recognizing = false;
        voiceBtn.textContent = "🎤 음성 명령 시작";
        voiceBtn.classList.remove('listening');
      };
      recognition.onerror = (e)=> {
        voiceResult.textContent = "음성 인식 오류: " + e.error;
        recognizing = false;
        voiceBtn.classList.remove('listening');
      };
      recognition.onresult = (evt)=>{
        const transcript = evt.results[0][0].transcript.trim();
        voiceResult.textContent = "👉 " + transcript;
        interpretVoiceCommand(transcript);
      };

      voiceBtn.onclick = function() {
        if (recognizing) {
          recognition.stop();
        } else {
          try {
            recognition.start();
          } catch(e) {}
        }
      };
    } else {
      voiceBtn.textContent = "🎤 음성 인식 미지원 (PC의 Chrome/Edge 추천)";
      voiceBtn.disabled = true;
    }

    // 음성 명령 해석 (정규식 사용, 단순 rule-based)
    function interpretVoiceCommand(cmd) {
      let matched = false;
      cmd = cmd.replace(/\s/g,''); // 공백 제거로 좀더 관대하게

      // ① 기기 on/off 음성 명령
      [
        { dev:"light", ko: ["불","거실불","조명"] },
        { dev:"aircon", ko: ["에어컨"] },
        { dev:"boiler", ko: ["보일러"] }
      ].forEach(info=>{
        for(const k of info.ko) {
          if (cmd.includes(k)) {
            if (cmd.match(/(켜|온|올려|밝게|가동)/i)) {
              updateDeviceSwitch(info.dev, true);
              showToast(`[${devices[info.dev].name}] 켜기 완료`);
              matched = true;
            }
            else if (cmd.match(/(꺼|오프|올스톱|내려|어둡게|멈춰)/i)) {
              updateDeviceSwitch(info.dev, false);
              showToast(`[${devices[info.dev].name}] 끄기 완료`);
              matched = true;
            }
          }
        }
      });

      // ② 스케줄 추가(연속 음성)
      if(cmd.match(/(스케줄|예약|정해|설정)/)) {
        document.getElementById('device-select').focus();
        showToast("스케줄 추가를 위해 아래 입력폼을 사용하세요!");
        matched = true;
      }

      // ③ 에너지/절약 관련
      if(cmd.includes('에너지') || cmd.includes('절약') || cmd.includes('전기')) {
        refreshEnergyBar();
        document.getElementById('energy').scrollIntoView({behavior:'smooth'});
        showToast("에너지 현황을 확인하세요!");
        matched = true;
      }

      if(!matched) {
        showToast('알 수 없는 명령입니다. "에어컨 꺼줘", "불 켜" 등으로 다시 시도해보세요.');
      }
    }

    // AI형 스케줄 추천 (단순화)
    function aiSuggestSchedules() {
      const now = new Date();
      let suggested = [];
      // 퇴근(18~19시)엔 불 on, 에어컨/보일러 on, 취침 전엔 off 추천
      let commuteHour = 18 + Math.round(Math.random());
      let sleepHour = 23;
      suggested.push({ device: "light", action: "on", time: pad(commuteHour)+":30" });
      suggested.push({ device: "aircon", action: "on", time: pad(commuteHour)+":40" });
      suggested.push({ device: "light", action: "off", time: pad(sleepHour)+":30" });
      suggested.push({ device: "aircon", action: "off", time: pad(sleepHour)+":59" });
      suggested.push({ device: "boiler", action: "on", time: "06:30" });

      // 실제로 적용
      let cnt = 0;
      suggested.forEach(sch=>{
        // 중복 방지
        if(!devices[sch.device].schedules.some(s=>s.time===sch.time && s.action===sch.action)) {
          devices[sch.device].schedules.push({action:sch.action, time:sch.time});
          cnt++;
        }
      });
      showSchedules();
      refreshEnergyBar();
      showToast(cnt + "개의 AI 추천 스케줄을 추가했습니다.");
    }
    // AI 추천 버튼 추가(최초 1회)
    (function(){
      const form = document.getElementById('scheduler-form');
      const aiBtn = document.createElement("button");
      aiBtn.type = "button";
      aiBtn.style.marginLeft = "0.9em";
      aiBtn.textContent = "AI 추천 자동 추가";
      aiBtn.onclick = aiSuggestSchedules;
      form.appendChild(aiBtn);
    })();

    function pad(n){
      return n<10 ? "0"+n : ""+n;
    }

    // 페이지 최초 에너지 갱신
    refreshEnergyBar();

  </script>
</body>
</html>
