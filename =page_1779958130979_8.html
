<html>
<head>
  <meta charset="UTF-8">
  <title>대표이사 테스트 문자 발송</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #f4f6fa;
      font-family: 'Noto Sans KR', Arial, sans-serif;
      padding: 0;
      margin: 0;
    }
    .container {
      background: #fff;
      max-width: 420px;
      margin: 50px auto 0 auto;
      padding: 32px 26px 26px 26px;
      border-radius: 16px;
      box-shadow: 0 2px 18px rgba(50, 60, 80, 0.09);
    }
    .title {
      text-align: center;
      font-size: 1.55rem;
      color: #253053;
      margin-bottom: 18px;
      font-weight: 700;
      letter-spacing: -1px;
    }
    .form-group {
      margin-bottom: 18px;
    }
    label {
      display: block;
      font-size: 1rem;
      margin-bottom: 7px;
      color: #223055;
      font-weight: 600;
    }
    input[type="text"],
    input[type="tel"] {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1.2px solid #dbe2ec;
      font-size: 1rem;
      transition: border 0.2s;
      outline: none;
      box-sizing: border-box;
    }
    input[type="text"]:focus,
    input[type="tel"]:focus {
      border-color: #467cff;
    }
    textarea {
      width: 100%;
      min-height: 68px;
      padding: 10px;
      border-radius: 6px;
      border: 1.2px solid #dbe2ec;
      font-size: 1rem;
      resize: vertical;
      transition: border 0.2s;
      outline: none;
      box-sizing: border-box;
    }
    textarea:focus {
      border-color: #467cff;
    }
    .btn {
      width: 100%;
      background: #3b6bff;
      color: #fff;
      border: none;
      padding: 14px 0 12px 0;
      border-radius: 6px;
      font-size: 1.09rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 4px;
      transition: background 0.18s;
    }
    .btn:hover, .btn:focus {
      background: #2950b6;
      outline: none;
    }
    .result {
      margin-top: 24px;
      padding: 16px;
      border-radius: 8px;
      background: #e7f0fd;
      color: #263c6e;
      font-size: 1.05rem;
      font-weight: 500;
      display: none;
      word-break: break-all;
    }
    .error {
      background: #fde8ea;
      color: #a81627;
      margin-top: 4px;
      margin-bottom: 6px;
      padding: 9px 12px;
      border-radius: 5px;
      font-size: 0.96rem;
      display: none;
    }
    .sample-msg {
      font-size: 0.91rem;
      background: #f5f8ff;
      border-left: 3px solid #3b6bff;
      padding: 8px 10px;
      margin-bottom: 14px;
      color: #253053;
      border-radius: 4px;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">대표이사 테스트 문자 발송</div>
    <div class="sample-msg">
      <b>문자 예시:</b><br>
      [대표이사직인 테스트]<br>
      안녕하세요, 대표이사 시험 문자입니다.<br>
      - 송신자: 홍길동
    </div>
    <div class="error" id="error"></div>
    <form id="smsForm" autocomplete="off">
      <div class="form-group">
        <label for="sender">송신자 이름</label>
        <input type="text" id="sender" maxlength="10" placeholder="예: 김대표" required>
      </div>
      <div class="form-group">
        <label for="recipient">수신자 전화번호</label>
        <input type="tel" id="recipient" maxlength="13" placeholder="예: 010-1234-5678" required>
      </div>
      <div class="form-group">
        <label for="message">문자 내용</label>
        <textarea id="message" maxlength="90" placeholder="문자 내용을 입력하세요."></textarea>
      </div>
      <button type="submit" class="btn">테스트 문자 발송</button>
    </form>
    <div class="result" id="result"></div>
  </div>
  <script>
    // 전화번호 자동 하이픈 포맷
    document.getElementById('recipient').addEventListener('input', function(e) {
      let val = e.target.value.replace(/[^0-9]/g,'');
      let output = '';
      if(val.length < 4) output = val;
      else if(val.length < 8) output = val.slice(0,3)+'-'+val.slice(3);
      else output = val.slice(0,3)+'-'+val.slice(3,7)+'-'+val.slice(7,11);
      e.target.value = output;
    });

    function showError(msg) {
      const err = document.getElementById('error');
      err.textContent = msg;
      err.style.display = 'block';
      setTimeout(() => {
        err.style.display = 'none';
      }, 3000);
    }

    function isValidPhone(phone) {
      // 010-1234-5678 형식, 13자
      return /^010-\d{4}-\d{4}$/.test(phone);
    }

    document.getElementById('smsForm').addEventListener('submit', function(e){
      e.preventDefault();
      const sender = document.getElementById('sender').value.trim();
      const recipient = document.getElementById('recipient').value.trim();
      const message = document.getElementById('message').value.trim();

      if(sender.length < 2) {
        showError('송신자 이름은 2자 이상 입력하세요.');
        document.getElementById('sender').focus();
        return;
      }
      if(!isValidPhone(recipient)) {
        showError('전화번호를 010-1234-5678 형식으로 입력하세요.');
        document.getElementById('recipient').focus();
        return;
      }
      let realMsg = message.length > 0 ? message : `[대표이사직인 테스트]
안녕하세요, 대표이사 시험 문자입니다.
- 송신자: ${sender}`;

      if(realMsg.length > 90) {
        showError('문자 내용은 90자 이내로 입력하세요.');
        document.getElementById('message').focus();
        return;
      }

      // 실제 문자 발송 부분 대신 "테스트" 출력
      document.getElementById('result').style.display = 'block';
      document.getElementById('result').innerHTML =
        `<b>테스트 문자 발송이 완료되었습니다.</b><br><br>
        <b>수신자 번호:</b> ${recipient}<br>
        <b>송신자:</b> ${sender}<br>
        <b>문자 내용:</b><br>
        <div style="white-space:pre-line;margin-top:4px;">${realMsg}</div>`;
      
      document.getElementById('smsForm').reset();
    });
  </script>
</body>
</html>
