<html>
<head>
  <meta charset="UTF-8">
  <title>대표이사 테스트 문자 발송</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f4f8fb;
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }
    .container {
      max-width: 430px;
      margin: 40px auto;
      background: #fff;
      border-radius: 10px;
      padding: 34px 26px 34px 26px;
      box-shadow: 0 8px 32px rgba(34,55,90,0.14), 0 1.5px 4px rgba(51,64,100,0.08);
    }
    h2 {
      margin: 0 0 18px 0;
      font-size: 1.7em;
      color: #2e446a;
      text-align: center;
      font-weight: 700;
    }
    label {
      display: block;
      margin-top: 16px;
      margin-bottom: 6px;
      font-weight: 600;
      color: #334d6e;
    }
    input[type="text"], textarea {
      width: 100%;
      border: 1px solid #c9daf8;
      border-radius: 7px;
      outline: none;
      padding: 11px 12px;
      font-size: 1em;
      box-sizing: border-box;
      background: #f8fbff;
      transition: border 0.2s;
    }
    input[type="text"]:focus, textarea:focus {
      border: 1.5px solid #3e7cd2;
      background: #fff;
    }
    textarea {
      resize: vertical;
      min-height: 70px;
      max-height: 210px;
    }
    .btn-send {
      margin-top: 22px;
      width: 100%;
      background: #226bf5;
      color: #fff;
      border: none;
      border-radius: 7px;
      padding: 13px 0;
      font-size: 1.15em;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.19s, box-shadow 0.18s;
      box-shadow: 0 2px 9px rgba(34,107,245,0.08);
    }
    .btn-send:hover, .btn-send:focus {
      background: #1243a7;
    }
    .msg-success, .msg-error {
      text-align: center;
      margin-top: 18px;
      padding: 11px 0;
      border-radius: 6px;
      font-size: 1.08em;
      font-weight: 500;
      display: none;
    }
    .msg-success {
      background: #e6faeb;
      color: #207244;
      border: 1px solid #abedc9;
    }
    .msg-error {
      background: #fdeaea;
      color: #b52222;
      border: 1px solid #eebbbb;
    }
    .sample-use {
      font-size: 0.97em;
      color: #919fb4;
      margin-top: 5px;
      margin-bottom: 0;
      text-align: right;
    }
    @media (max-width: 550px) {
      .container {
        box-sizing: border-box;
        width: 96vw;
        padding: 22px 5vw;
        margin-top: 0.8em;
      }
      h2 { font-size: 1.3em; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>대표이사 테스트 문자 발송</h2>
    <form id="smsForm" autocomplete="off">
      <label for="to">수신자 번호</label>
      <input type="text" id="to" name="to" maxlength="13" placeholder="예: 01012345678 또는 010-1234-5678" autocomplete="off">
      <div class="sample-use">* 숫자만 또는 '-' 포함 입력 가능</div>

      <label for="message">메시지 내용</label>
      <textarea id="message" name="message" maxlength="90" placeholder="메시지를 입력하세요 (최대 90자)" autocomplete="off"></textarea>
      <div class="sample-use">* 예시: 대표이사 테스트 문자입니다.</div>
      
      <button type="submit" class="btn-send">테스트 문자 발송</button>
    </form>
    <div class="msg-success" id="msgSuccess">테스트 문자가 성공적으로 발송되었습니다.</div>
    <div class="msg-error" id="msgError">오류가 발생했습니다. 입력값을 확인하세요.</div>
  </div>
  <script>
    // 입력값 검증(전화번호는 숫자와 '-'만, 10~13자)
    function validatePhone(phone) {
      let normalized = phone.replace(/-/g, '').replace(/\s/g, '');
      if (!/^\d{10,11}$/.test(normalized)) return false;
      if (!(normalized.startsWith('010') || normalized.startsWith('011') || normalized.startsWith('016') || normalized.startsWith('017') || normalized.startsWith('018') || normalized.startsWith('019'))) return false;
      return true;
    }

    document.getElementById('smsForm').addEventListener('submit', function(e) {
      e.preventDefault();

      var phone = document.getElementById('to').value.trim();
      var msg = document.getElementById('message').value.trim();
      var msgSuccess = document.getElementById('msgSuccess');
      var msgError = document.getElementById('msgError');
      msgSuccess.style.display = 'none';
      msgError.style.display = 'none';

      // Validation
      if (!validatePhone(phone)) {
        msgError.innerText = "수신자 번호를 올바르게 입력하세요.";
        msgError.style.display = 'block';
        return;
      }
      if (msg.length === 0 || msg.length > 90) {
        msgError.innerText = "메시지 내용을 1~90자로 입력하세요.";
        msgError.style.display = 'block';
        return;
      }

      // "전송중" 버튼 처리
      var btn = this.querySelector('.btn-send');
      var orgText = btn.textContent;
      btn.textContent = '전송 중...';
      btn.disabled = true;

      // 실제 문자 전송 API가 없으므로... 데모 동작(성공) 시뮬레이션
      setTimeout(function() {
        msgSuccess.innerText = "테스트 문자가 성공적으로 발송되었습니다.";
        msgSuccess.style.display = 'block';
        btn.textContent = orgText;
        btn.disabled = false;
        // 입력값 초기화
        document.getElementById('to').value = '';
        document.getElementById('message').value = '';
      }, 1200);

      // 에러 시 아래처럼 사용하세요
      // msgError.innerText = "문자 발송에 실패했습니다.";
      // msgError.style.display = 'block';
    });

    // 전화번호 실시간 입력 포맷팅
    document.getElementById('to').addEventListener('input', function(e) {
      var num = this.value.replace(/[^\d]/g, '');
      if (num.length <= 3) {
        this.value = num;
      } else if (num.length <= 7) {
        this.value = num.substr(0,3) + '-' + num.substr(3);
      } else if (num.length <= 11) {
        this.value = num.substr(0,3) + '-' + num.substr(3,4) + '-' + num.substr(7);
      } else {
        this.value = num.substr(0,3) + '-' + num.substr(3,4) + '-' + num.substr(7,4);
      }
    });

    // 메시지 글자수 제한 안내
    document.getElementById('message').addEventListener('input', function() {
      if (this.value.length > 90) {
        this.value = this.value.substring(0, 90);
      }
    });
  </script>
</body>
</html>
