<html>
<head>
  <meta charset="UTF-8">
  <title>레스토랑 메뉴 메이커</title>
  <style>
    body {
      background: #f8fafb;
      font-family: 'Segoe UI', '맑은 고딕', sans-serif;
      margin: 0;
      padding: 0;
      color: #444;
    }
    .container {
      max-width: 700px;
      margin: 40px auto;
      background: #fff;
      border-radius: 11px;
      box-shadow: 0 3px 18px rgba(0,0,0,0.09);
      padding: 32px 28px 40px 28px;
    }
    h1 {
      text-align: center;
      color: #2d4251;
      letter-spacing: 2px;
      margin-bottom: 32px;
    }
    form {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
      margin-bottom: 38px;
      justify-content: center;
    }
    form input, form select {
      font-size: 1rem;
      border-radius: 6px;
      border: 1px solid #b8c3cf;
      padding: 7px 11px;
    }
    form input[type="text"], form input[type="number"] {
      width: 140px;
    }
    form input[type="submit"] {
      background-color: #2d4251;
      color: #fff;
      border: none;
      font-weight: bold;
      cursor: pointer;
      padding: 8px 18px;
      transition: background 0.2s;
    }
    form input[type="submit"]:hover {
      background: #456786;
    }
    .menu-list {
      margin-top: 22px;
    }
    .menu-category {
      font-size: 1.23em;
      font-weight: bold;
      color: #30546c;
      background: #f2f8fd;
      padding: 6px 12px;
      border-radius: 7px;
      margin-top: 20px;
      margin-bottom: 11px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    ul.menu-items {
      list-style: none;
      padding: 0;
      margin: 0 0 12px 0;
    }
    .menu-item {
      display: flex;
      align-items: center;
      background: #f8fafd;
      border-radius: 6px;
      padding: 12px 12px;
      margin-bottom: 7px;
      justify-content: space-between;
      border-bottom: 1px solid #e3e9ed;
      animation: fadein 0.38s;
    }
    @keyframes fadein {
      0% { opacity: 0; transform: translateY(15px);}
      100% { opacity: 1; transform: none;}
    }
    .menu-info {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-width: 0;
    }
    .menu-name-price {
      font-size: 1.05em;
      font-weight: 500;
      margin-bottom: 2px;
      word-break:break-all;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .menu-desc {
      font-size: 0.99em;
      color: #5a6a7a;
      margin-top: 2px;
      word-break:break-all;
    }
    .menu-actions {
      display: flex;
      gap: 7px;
      align-items: center;
      margin-left: 20px;
    }
    .menu-actions button {
      border: none;
      background: none;
      cursor: pointer;
      color: #db3340;
      font-size: 1rem;
      border-radius: 4px;
      padding: 3px 7px;
      transition: background 0.16s;
    }
    .menu-actions button.edit {
      color: #35725b;
      font-weight: bold;
    }
    .menu-actions button:hover {
      background: #ececf1;
    }
    .empty-msg {
      text-align: center;
      color: #b3bac5;
      margin-top: 30px;
      font-size: 1.1em;
    }
    @media (max-width: 600px) {
      .container {
        padding: 14px 6px 18px 6px;
      }
      form {
        gap: 8px;
      }
      form input[type="text"], form input[type="number"] {
        width: 88px;
      }
      .menu-item {
        flex-direction: column;
        align-items: flex-start;
        padding: 12px 7px;
      }
      .menu-actions {
        margin-left: 0;
        margin-top: 7px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>레스토랑 메뉴 메이커 🍽️</h1>
    <form id="menu-form" autocomplete="off">
      <input type="text" id="menu-name" placeholder="메뉴 이름" required>
      <input type="number" id="menu-price" placeholder="가격" min="0" required>
      <input type="text" id="menu-desc" placeholder="설명">
      <select id="menu-category" required>
        <option value="" disabled selected>카테고리</option>
        <option value="에피타이저">에피타이저</option>
        <option value="메인 요리">메인 요리</option>
        <option value="디저트">디저트</option>
        <option value="음료">음료</option>
      </select>
      <input type="submit" value="추가하기">
    </form>

    <div class="menu-list" id="menu-list"></div>
  </div>

  <script>
    // 데이터 - 메뉴 목록. localStorage에 저장해 반영.
    let menus = [];

    // 불러오기
    function loadMenus() {
      try {
        const saved = localStorage.getItem('menus');
        if (saved) menus = JSON.parse(saved);
      } catch(e) {
        menus = [];
      }
    }
    function saveMenus() {
      localStorage.setItem('menus', JSON.stringify(menus));
    }

    function renderMenus() {
      const menuListDiv = document.getElementById('menu-list');
      if (menus.length === 0) {
        menuListDiv.innerHTML = `<div class="empty-msg">아직 등록된 메뉴가 없습니다.<br>메뉴를 추가해 보세요!</div>`;
        return;
      }
      // 카테고리 그룹화
      const categories = {};
      menus.forEach(item => {
        if (!categories[item.category]) categories[item.category] = [];
        categories[item.category].push(item);
      });
      // 카테고리 순서
      const catOrder = ['에피타이저','메인 요리','디저트','음료'];
      let html = '';
      for(const cat of catOrder) {
        if(!categories[cat]) continue;
        html += `<div class="menu-category">🍴 ${cat}</div><ul class="menu-items">`;
        categories[cat].forEach((item, idx) => {
          html += `<li class="menu-item" data-id="${item.id}">
            <div class="menu-info">
              <div class="menu-name-price">
                <span>${escapeHTML(item.name)}</span>
                <span style="color:#4574c2;font-weight:bold;">${Number(item.price).toLocaleString()}원</span>
              </div>
              ${item.desc? `<div class="menu-desc">${escapeHTML(item.desc)}</div>` : ``}
            </div>
            <div class="menu-actions">
              <button class="edit" title="수정">수정</button>
              <button class="delete" title="삭제">삭제</button>
            </div>
          </li>`;
        });
        html += `</ul>`;
      }
      menuListDiv.innerHTML = html;
    }

    // XSS 방지
    function escapeHTML(str) {
      return (str??'').replace(/[&<>"']/g, s => ({
        '&':'&amp;', '<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      }[s]));
    }

    // 메뉴 추가 및 폼처리
    let editId = null;
    document.getElementById('menu-form').onsubmit = function(e){
      e.preventDefault();
      const name = document.getElementById('menu-name').value.trim();
      const price = document.getElementById('menu-price').value;
      const desc = document.getElementById('menu-desc').value.trim();
      const category = document.getElementById('menu-category').value;
      if(!name || !price || !category) return;
      if(editId) { // 수정 상태
        const idx = menus.findIndex(m => m.id===editId);
        if(idx!==-1) {
          menus[idx] = {...menus[idx], name, price, desc, category};
        }
        editId = null;
      } else { // 새 메뉴
        const id = 'm'+(Date.now())+Math.floor(Math.random()*9000);
        menus.push({ id, name, price, desc, category });
      }
      saveMenus();
      renderMenus();
      this.reset();
      document.getElementById('menu-category').selectedIndex = 0;
      this.querySelector('input[type="submit"]').value = '추가하기';
    };

    // 메뉴 삭제/수정 이벤트 위임
    document.getElementById('menu-list').onclick = function(e){
      const btn = e.target.closest('button');
      if(!btn) return;
      const item = e.target.closest('.menu-item');
      const id = item.getAttribute('data-id');
      if(btn.classList.contains('delete')){
        if(confirm('정말 삭제하시겠습니까?')) {
          menus = menus.filter(m => m.id !== id);
          saveMenus();
          renderMenus();
        }
      } else if(btn.classList.contains('edit')) {
        setEditMenu(id);
      }
    };

    function setEditMenu(id){
      const m = menus.find(m=>m.id===id);
      if(m) {
        document.getElementById('menu-name').value = m.name;
        document.getElementById('menu-price').value = m.price;
        document.getElementById('menu-desc').value = m.desc;
        document.getElementById('menu-category').value = m.category;
        editId = id;
        document.getElementById('menu-form').querySelector('input[type="submit"]').value = '수정완료';
        document.getElementById('menu-name').focus();
      }
    }

    // 첫 로딩
    loadMenus();
    renderMenus();
  </script>
</body>
</html>
